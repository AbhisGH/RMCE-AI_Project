<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dot Prompt Builder</title>
<link rel="icon" type="image/png" href="source/images.png">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- SIDEBAR BACKDROP -->
<div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <a class="sidebar-brand" href="#">
      <svg class="sidebar-brand-logo" viewBox="0 0 30 30" fill="none">
        <rect x="2" y="2" width="26" height="26" rx="7" stroke="#8BD400" stroke-width="1.7"/>
        <line x1="8" y1="10" x2="22" y2="10" stroke="#8BD400" stroke-width="1.7" stroke-linecap="round"/>
        <line x1="8" y1="15" x2="18" y2="15" stroke="#8BD400" stroke-width="1.7" stroke-linecap="round"/>
        <line x1="8" y1="20" x2="13" y2="20" stroke="#8BD400" stroke-width="1.7" stroke-linecap="round"/>
        <polyline points="17,19 20,23 22,17" stroke="#8BD400" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span class="sidebar-brand-text">Prompt Builder</span>
    </a>
    <button class="btn-sidebar-close" onclick="closeSidebar()" aria-label="Close sidebar">&#x2715;</button>
  </div>
  <div class="sidebar-actions">
    <button class="btn-new-prompt" onclick="closeSidebar()">
      <svg viewBox="0 0 16 16"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
      New Prompt
    </button>
  </div>
  <div class="sidebar-body">
    <div id="sidebar-list"><div class="sidebar-empty">No prompts yet</div></div>
  </div>
  <div class="sidebar-foot">
    <div class="sidebar-profile">
      <div class="sidebar-avatar">
        <svg viewBox="0 0 16 16"><circle cx="8" cy="5.5" r="2.5"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
      </div>
      <div class="sidebar-profile-info">
        <div class="sidebar-profile-name">RM Team</div>
        <div class="sidebar-profile-role">RMCE · V1</div>
      </div>
    </div>
  </div>
</aside>

<!-- NAV -->
<nav>
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="btn-menu" id="btn-menu" aria-label="Open menu" onclick="openSidebar()">
      <span></span><span></span><span></span>
    </button>
    <a class="nav-brand" href="#">
      <svg class="nav-logo" viewBox="0 0 30 30" fill="none">
        <rect x="2" y="2" width="26" height="26" rx="7" stroke="#8BD400" stroke-width="1.7"/>
        <line x1="8" y1="10" x2="22" y2="10" stroke="#8BD400" stroke-width="1.7" stroke-linecap="round"/>
        <line x1="8" y1="15" x2="18" y2="15" stroke="#8BD400" stroke-width="1.7" stroke-linecap="round"/>
        <line x1="8" y1="20" x2="13" y2="20" stroke="#8BD400" stroke-width="1.7" stroke-linecap="round"/>
        <polyline points="17,19 20,23 22,17" stroke="#8BD400" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span class="nav-brand-text">Dot Prompt Builder</span>
      <span class="v1-badge">V1</span>
    </a>
  </div>
  <div class="nav-right">
    <a class="btn-dotai-nav" href="https://eu.getdot.ai" target="_blank" rel="noopener">
      <svg class="icon" viewBox="0 0 14 14"><path d="M2 7h10M8 3l4 4-4 4"/></svg>
      Open DOT AI
    </a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Build Revenue Management<br><span>Prompts in Seconds</span></h1>
  <p>Generate structured business review prompts for DOT AI.</p>
</section>

<!-- MAIN -->
<main id="app"></main>

<!-- MODAL -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-header-top">
        <div class="modal-title" id="modal-title"></div>
        <button class="modal-close" id="modal-close" aria-label="Close">&#x2715;</button>
      </div>
      <div class="progress-dots" id="progress-dots"></div>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <div class="footer-left">
        <button class="btn-cancel" id="btn-cancel">Cancel</button>
      </div>
      <div class="footer-right">
        <button class="btn-prev" id="btn-prev">&#x2190; Previous</button>
        <button class="btn-next" id="btn-next">Next &#x2192;</button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<footer>Flix Prompt Builder &mdash; Revenue Management Command Excellence &bull; V1</footer>

<script src="js/app.js"></script>
</body>
</html>
